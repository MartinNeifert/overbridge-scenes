name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config curl jq

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0

      - name: cargo test
        run: cargo test --test e2e_params -- --test-threads=1

      - name: cargo check
        run: cargo check --release

      - name: Live fake-plugin smoke (optional)
        run: ./scripts/test-params.sh --live
