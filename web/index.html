<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overbridge Host — Control Surface</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="device-header.css" />
</head>
<body>
  <header>
    <h1>Overbridge Host</h1>
    <div id="ob-device-header"></div>
  </header>

  <section class="devices-panel" id="devices-panel">
    <div id="device-detail" class="device-detail"></div>
  </section>

  <section class="toolbar">
    <input type="search" id="search" placeholder="Filter parameters…" />
    <label>
      <input type="checkbox" id="pinned-only" />
      Pinned only
    </label>
    <button id="refresh">Refresh</button>
  </section>

  <section class="layout">
    <aside class="sidebar">
      <h2>Pinned Controls</h2>
      <p class="hint">Click ★ on any parameter to pin it here for physical controller mapping.</p>
      <div id="pinned-controls" class="control-grid"></div>

      <h2>MIDI Quick Send</h2>
      <div class="midi-panel">
        <label>Channel <input type="number" id="midi-channel" min="0" max="15" value="0" /></label>
        <label>CC <input type="number" id="midi-cc" min="0" max="127" value="1" /></label>
        <input type="range" id="midi-cc-value" min="0" max="127" value="64" />
        <button id="send-cc">Send CC</button>
      </div>
    </aside>

    <main>
      <h2>All Parameters</h2>
      <div id="parameters" class="param-list"></div>
    </main>
  </section>

  <script src="device-header.js"></script>
  <script src="app.js"></script>
</body>
</html>
